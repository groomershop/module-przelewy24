<div data-bind="attr: { class: 'payment-method payment-method-' + getCode() }, css: { '_active': (getCode() == isChecked()) }">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="
                    attr: {'id': getCode()},
                    value: getCode(),
                    checked: isChecked,
                    click: selectPaymentMethod,
                    visible: isRadioButtonVisible()"/>
        <label class="label payment-method-label-przelewy24" data-bind="attr: {'for': getCode()}">
            <img data-bind="attr: { src: getLogo(), class: 'payment-method-icon payment-method-icon-przelewy24 payment-method-icon-' + getCode() }"
                 alt="BLIK"/>
            <span class="przelewy24-payment-method-description">
                <span class="przelewy24-payment-method-title" data-bind="i18n: 'BLIK'"></span>
                <span class="przelewy24-payment-method-subtitle" data-bind="i18n: 'Enter 6 digit BLIK code'"></span>
            </span>
        </label>
    </div>
    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="payment-method-przelewy24__agreements fieldset">
            <div class="payment-method-przelewy24__agreement field choice required">
                <input type="checkbox" name="przelewy24-regulations-accept"
                       id="przelewy24-regulations-accept-blik"
                       class="required-entry przelewy24-regulations-accept"/>
                <label class="label" for="przelewy24-regulations-accept-blik">
                    <span data-bind="html: getRegulations()"></span>
                </label>
            </div>
        </div>
        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <!-- ko if: (isVaultEnabled())-->
        <div class="field choice">
            <input type="checkbox"
                   name="vault[is_enabled]"
                   class="checkbox"
                   data-bind="attr: {'id': getCode() + '_enable_vault'}, checked: vaultEnabler.isActivePaymentTokenEnabler"/>
            <label class="label" data-bind="attr: {'for': getCode() + '_enable_vault'}">
                <span><!-- ko i18n: 'Save for later use.'--><!-- /ko --></span>
            </label>
        </div>
        <!-- /ko -->
        <fieldset class="fieldset blik-code-fieldset">
            <div class="field">
                <label class="label" for="blik-code">
                    <span data-bind="i18n: 'Enter 6 digit BLIK code and confirm transaction on your device'"></span>
                </label>

                <div class="control">
                    <input type="text" id="blik-code" data-bind="textInput: blikCode" maxlength="6"/>
                    <div class="blik-placeholder">
                        <span class="blik-placeholder-element"></span>
                        <span class="blik-placeholder-element"></span>
                        <span class="blik-placeholder-element"></span>
                        <span class="blik-placeholder-element"></span>
                        <span class="blik-placeholder-element"></span>
                        <span class="blik-placeholder-element"></span>
                    </div>
                </div>
            </div>
        </fieldset>

        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="submit"
                        data-bind="
                            click: registerTransactionAndPlaceOrder,
                            attr: { title: $t('Place Order') },
                            css: { disabled: !isBlikCodeReady() },
                            enable: (getCode() == isChecked())"
                        disabled
                >
                    <span data-bind="i18n: 'Place Order'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
