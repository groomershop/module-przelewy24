<div data-bind="attr: { class: 'payment-method payment-method-' + getCode() }, css: { '_active': (getCode() == isChecked()) }">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="
                    attr: {'id': getCode()},
                    value: getCode(),
                    checked: isChecked,
                    click: selectPaymentMethod,
                    visible: isRadioButtonVisible()"/>
        <label class="label payment-method-label-przelewy24" data-bind="attr: {'for': getCode()}">
            <img data-bind="attr: { src: getLogo(), class: 'payment-method-icon payment-method-icon-' + getCode() }"
                 alt="Przelewy24"/>
            <span class="przelewy24-payment-method-description">
                <span class="przelewy24-payment-method-title" data-bind="i18n: 'Transfer online'"></span>
                <span class="przelewy24-payment-method-subtitle" data-bind="i18n: 'Quick transfer from your bank'"></span>
            </span>
        </label>
    </div>
    <div class="payment-method-content" data-bind="afterRender: initPreSelected()">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <div class="payment-method-przelewy24__methods" data-bind="foreach: przelewy24Methods">
            <!-- ko if: $parent.isMethodVisible($data) -->
                <div class="payment-method-przelewy24__method" data-bind="
                    attr: { title: name },
                    click: $parent.selectMethod.bind($parent),
                    css: {
                        'payment-method-przelewy24__method--selected': $parent.isMethodSelected($data),
                        'payment-method-przelewy24__method--promoted': $parent.isMethodPromoted(id)
                    }
                ">
                    <div class="payment-method-przelewy24__method-wrapper">
                        <img class="payment-method-przelewy24__method-img" data-bind="attr: { src: img_url, alt: name }"/>
                    </div>
                </div>
                <!-- ko if: $parent.isMethodPromoted(id) -->
                    <div class="payment-method-przelewy24__method--divider"></div>
                <!--/ko-->
            <!--/ko-->
        </div>
        <!-- ko if: selectedPrzelewy24Method -->
            <p>
                <span data-bind="i18n: 'Selected payment method:'"></span>
                <strong data-bind="text: selectedPrzelewy24Method().name"></strong>
            </p>
        <!--/ko-->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <!-- ko if: isRegulationsAcceptVisible() -->
            <div class="payment-method-przelewy24__agreements fieldset">
                <div class="payment-method-przelewy24__agreement field choice required">
                    <input type="checkbox" name="przelewy24-regulations-accept"
                           id="przelewy24-regulations-accept"
                           class="required-entry przelewy24-regulations-accept"
                           data-bind="checked: regulationAccept"/>
                    <label class="label" for="przelewy24-regulations-accept">
                        <span data-bind="html: getRegulations()"></span>
                    </label>
                </div>
            </div>
        <!--/ko-->
        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="submit"
                        data-bind="
                            click: placeOrder,
                            attr: { title: $t('Place Order') },
                            css: { disabled: !isPaymentReady() },
                            enable: (getCode() == isChecked())"
                        disabled
                >
                    <span data-bind="i18n: 'Place Order'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
